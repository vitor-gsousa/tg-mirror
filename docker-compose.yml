services:
  tg-mirror:
    platform: linux/arm/v7
    image: ghcr.io/vitor-gsousa/tg-mirror:latest
    container_name: tg-mirror
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./config:/config
      - ./data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
